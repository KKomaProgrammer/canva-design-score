<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="popup.css"><title>Canva Design Score</title></head>
<body>
  <header class="app-header"><div class="mark">DS</div><div><h1>Canva Design Score</h1><p>프레젠테이션 디자인 완성도 평가</p></div><button id="historyButton" class="history-button" title="분석 기록" aria-label="분석 기록"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5M12 7v5l3 2"/></svg></button></header>
  <div id="historyOverlay" class="history-overlay" aria-hidden="true">
    <aside class="history-panel">
      <div class="history-head"><div><b>분석 기록</b><span>저장된 프레젠테이션</span></div><div class="history-actions"><button id="deleteAllHistory" class="delete-all">모두 삭제</button><button id="closeHistory" class="icon-button" aria-label="기록 닫기"><svg viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></svg></button></div></div>
      <div id="historyList" class="history-list"></div>
    </aside>
  </div>
  <section class="settings">
    <label>API 주소<input id="endpoint" type="url" placeholder="https://canva-design-score.pages.dev/api/analyze"></label>
    <label>Access Token<input id="token" type="password" placeholder="Cloudflare에 설정한 토큰"></label>
    <label>모델<select id="model"><option value="gpt-5.6-luna">GPT-5.6 Luna · 기본</option><option value="gpt-5.6-terra">GPT-5.6 Terra · 정밀</option></select></label>
    <p class="auto-size">PNG 크기는 <code>.JFv1rQ</code> 페이지 수에 따라 자동 조정됩니다.</p>
    <button id="save" class="quiet">설정 저장</button>
  </section>
  <button id="analyze" class="primary">현재 프레젠테이션 평가</button>
  <div id="progress" class="progress hidden"><div class="bar"><i></i></div><p>준비 중</p></div>
  <section id="result" class="result hidden"></section>
  <button id="export" class="export hidden">상호작용 SVG 결과 다운로드</button>
  <p id="error" class="error hidden"></p>
  <script src="popup.js"></script>
</body></html>
